<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Attendo Pro | Manual Selection Fix</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --bg: #0f172a; --card: rgba(30, 41, 59, 0.7); --success: #10b981; --danger: #f43f5e; --text: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: radial-gradient(circle at top left, #1e1b4b, #0f172a); color: var(--text); padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: var(--card); backdrop-filter: blur(12px); padding: 2rem; border-radius: 28px; width: 100%; max-width: 420px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 24px; box-sizing: border-box; }
        input, select, button { width: 100%; padding: 14px; margin: 8px 0; border-radius: 14px; border: 1px solid rgba(255,255,255,0.1); background: rgba(15, 23, 42, 0.8); color: white; font-size: 16px; }
        button { background: var(--primary); border: none; font-weight: 700; cursor: pointer; }
        .hidden { display: none !important; }
        .student-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: rgba(255,255,255,0.03); border-radius: 18px; margin-top: 10px; }
        #toast { position: fixed; top: 20px; background: var(--primary); color: white; padding: 14px 28px; border-radius: 20px; font-weight: 600; visibility: hidden; z-index: 9999; }
        #toast.show { visibility: visible; animation: popDown 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes popDown { from { transform: translateY(-100px); } to { transform: translateY(0); } }
    </style>
</head>
<body onload="initApp()">

    <div id="toast">Action Successful</div>

    <div id="auth-card" class="card">
        <h1 style="text-align:center; color:var(--primary); font-weight:800; margin:0;">ATTENDO</h1>
        <div id="login-form">
            <input type="text" id="l-email" placeholder="Email">
            <input type="password" id="l-pass" placeholder="Password">
            <button onclick="login()">Sign In</button>
            <p onclick="toggleAuth('signup')" style="text-align:center; cursor:pointer; color:var(--primary); font-size:14px; margin-top:15px;">Create Account</p>
        </div>
        <div id="signup-form" class="hidden">
            <input type="text" id="s-email" placeholder="Email">
            <input type="text" id="s-name" placeholder="Name">
            <input type="password" id="s-pass" placeholder="Password">
            <input type="text" id="s-recovery" placeholder="4-Digit PIN">
            <button onclick="signup()">Register</button>
            <p onclick="toggleAuth('login')" style="text-align:center; cursor:pointer; font-size:14px;">Back</p>
        </div>
    </div>

    <div id="main-ui" class="hidden" style="width: 100%; max-width: 440px;">
        
        <div id="request-section" class="card" style="border-left: 5px solid #fbbf24;">
            <h3 style="margin:0; color:#fbbf24;">Room Selection</h3>
            <p style="font-size: 13px; opacity: 0.8;">Select your Class and Section to request access:</p>
            <select id="req-class">
                <option value="Class 6">Class 6</option><option value="Class 7">Class 7</option>
                <option value="Class 8">Class 8</option><option value="Class 9">Class 9</option>
                <option value="Class 10">Class 10</option><option value="Class 11">Class 11</option>
                <option value="Class 12">Class 12</option>
            </select>
            <select id="req-sec">
                <option value="Sec A">Section A</option>
                <option value="Sec B">Section B</option>
            </select>
            <button onclick="sendRequest()" style="background:#fbbf24; color:#000;">Send Access Request</button>
        </div>

        <div id="teacher-tools" class="card hidden">
            <h2 id="welcome-msg" style="margin:0;">Dashboard</h2>
            <p>Authorized: <b id="assigned-room" style="color:var(--primary)"></b></p>
            <select id="period-sel">
                <option>Period 1</option><option>Period 2</option><option>Period 3</option><option>Period 4</option>
                <option>Period 5</option><option>Period 6</option><option>Period 7</option><option>Period 8</option>
            </select>
            <div id="att-list"></div>
        </div>

        <div id="admin-panel" class="card hidden" style="border-left: 5px solid var(--primary);">
            <h3 style="margin:0; color:var(--primary)">Admin Panel</h3>
            <button onclick="updateWeb()" style="background:#4338ca; margin:10px 0;">Sync GitHub</button>
            <div id="request-list"></div>
        </div>

        <button onclick="logout()" style="background:transparent; border:1px solid var(--danger); color:var(--danger); width:100%;">Sign Out</button>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbw2M9raG_B3evHNfNvyeFSjIVNIT6DiJXNFRrZkxCpCRA8bp3dRC4B4Oj8drWgjkxqQgw/exec";
        const ADMIN = "yuvansood1234@gmail.com";

        function toast(m) { const t=document.getElementById("toast"); t.innerText=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3000); }

        async function initApp() {
            const user = sessionStorage.getItem('u_email');
            if(!user) return;

            document.getElementById('auth-card').classList.add('hidden');
            document.getElementById('main-ui').classList.remove('hidden');

            try {
                const res = await fetch(`${API}?action=checkStatus&email=${user}`);
                const status = await res.json();

                if(user === ADMIN) document.getElementById('admin-panel').classList.remove('hidden');

                if(status.role === "teacher") {
                    document.getElementById('request-section').classList.add('hidden');
                    document.getElementById('teacher-tools').classList.remove('hidden');
                    document.getElementById('assigned-room').innerText = status.class + " " + status.section;
                    fetchRoster(status.class, status.section);
                }
            } catch (e) { toast("Server Error. Use Request form below."); }
        }

        async function sendRequest() {
            const u = sessionStorage.getItem('u_email');
            const c = document.getElementById('req-class').value;
            const s = document.getElementById('req-sec').value;
            toast(`Requesting ${c} ${s}...`);
            await fetch(API, { method: "POST", body: JSON.stringify({ action: "requestAccess", email: u, name: u.split('@')[0], class: c, section: s }) });
            toast("Request Sent! Wait for Yuvan to approve.");
        }

        async function login() {
            const e = document.getElementById('l-email').value.trim(), p = document.getElementById('l-pass').value.trim();
            const res = await fetch(`${API}?action=login&email=${encodeURIComponent(e)}&pass=${encodeURIComponent(p)}`);
            if((await res.text()).trim() === "valid") { sessionStorage.setItem('u_email', e.toLowerCase()); location.reload(); }
            else toast("Login Failed");
        }

        function toggleAuth(m) { document.getElementById('login-form').classList.add('hidden'); document.getElementById('signup-form').classList.add('hidden'); document.getElementById(m + '-form').classList.remove('hidden'); }
        function logout() { sessionStorage.clear(); location.reload(); }
        async function fetchRoster(c,s) { /* Existing fetch roster logic here */ }
        async function updateWeb() { toast("Syncing..."); const res = await fetch(API, { method:"POST", body:JSON.stringify({ action:"pushToGitHub", adminEmail:ADMIN, htmlContent: document.documentElement.outerHTML })}); toast(await res.text()); }
    </script>
</body>
</html>
